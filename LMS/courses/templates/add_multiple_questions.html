<!DOCTYPE html>
<html>
<head>
    <title>Add Questions for Quiz</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .question-card {
            background: #f9f9f9;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border-left: 5px solid #764ba2;
        }

        h3 {
            margin-bottom: 10px;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #764ba2;
            outline: none;
            box-shadow: 0 0 5px rgba(118,75,162,0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:hover {
            background: #5a3d8a;
        }

        hr {
            border: none;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Add Questions</h2>

<form method="POST">
  {% csrf_token %}

  {% for i in count %}
    <div class="question-card">
        <h3>Question {{ forloop.counter }}</h3>

        <input type="text" name="question_{{ i }}" placeholder="Enter Question">

        <input type="text" name="option1_{{ i }}" placeholder="Option 1">
        <input type="text" name="option2_{{ i }}" placeholder="Option 2">
        <input type="text" name="option3_{{ i }}" placeholder="Option 3">
        <input type="text" name="option4_{{ i }}" placeholder="Option 4">

        <select name="correct_{{ i }}">
          <option value="">Select Correct Answer</option>
          <option value="1">Option 1</option>
          <option value="2">Option 2</option>
          <option value="3">Option 3</option>
          <option value="4">Option 4</option>
        </select>
    </div>
  {% endfor %}

  <button type="submit" class="btn"> Save and Submit Questions</button>

</form>

</div>

</body>
</html>
