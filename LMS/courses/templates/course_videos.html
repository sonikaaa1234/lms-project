<!DOCTYPE html>
<html>
<head>
    <title>Videos</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .video {
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 300px;
        }
        .video-description {
            margin-top: 15px;
            padding: 10px;
            background-color: #f5f5f5;
            border-left: 4px solid #007bff;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h2>{{ course.title }}</h2>

<p><b>Progress:</b> {{ progress }}%</p>

{% for v in videos %}
    <div class="video">
        <h3>{{ v.title }}</h3>
        <iframe src="{{ v.youtube_link }}" frameborder="0" allowfullscreen>

        </iframe>

     <div class=""video-description>
        <p>{{lesson.description}} </p>

     </div>
     <br><br>

        <a href="/courses/complete/{{ v.id }}/" class="btn">
            Mark as Completed
        </a>
    </div>
{% endfor %}
