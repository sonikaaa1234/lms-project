<!DOCTYPE html>
<html>
<head>
    <title>Create Course</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #764ba2, #667eea);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #764ba2;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a3d8a;
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #764ba2;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2> Create Course</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="title" placeholder="Course Title" required>

        <textarea name="description" placeholder="Course Description" required></textarea>

        <button type="submit"> Create</button>
    </form>

    <a href="/dashboard/" class="back-link">Back to Dashboard</a>
</div>

</body>
</html>
