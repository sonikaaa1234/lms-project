<form method="POST">
  {% csrf_token %}

  <input type="hidden" name="total" value="{{ total }}">

  {% for q in questions %}
    <p><b>{{ q.text }}</b></p>

    {% for c in q.choice_set.all %}
      <input type="radio" name="{{ q.id }}" value="{{ c.id }}">
      {{ c.text }}<br>
    {% endfor %}
    <br>
  {% endfor %}

  <button type="submit">Submit</button>
</form>
