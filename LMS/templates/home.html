<!DOCTYPE html>
<html>
<head>
    <title>LMS Home</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        a {
            display: block;
            margin: 10px 0;
            padding: 12px;
            text-decoration: none;
            color: white;
            background: #4facfe;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #007bff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📚 Welcome to LMS</h1>

    <a href="/signup/"> Signup</a>
    <a href="/login/"> Login</a>
</div>

</body>
</html>
