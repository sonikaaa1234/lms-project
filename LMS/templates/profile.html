<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #43cea2, #185a9d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .info {
            text-align: left;
            margin: 15px 0;
            font-size: 16px;
        }

        .info b {
            color: #185a9d;
        }

        .back-btn {
            display: block;
            margin-top: 20px;
            padding: 10px;
            background: #185a9d;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #0f3d73;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="profile-container">
    <h2>👤 Profile</h2>

    <div class="info">
        <p><b>Username:</b> {{ request.user.username }}</p>
        <p><b>Role:</b> {{ request.user.role }}</p>
        <p><b>Email:</b> {{ request.user.email }}</p>
    </div>

    <a href="/dashboard/" class="back-btn">← Back to Dashboard</a>
</div>

</body>
</html>
