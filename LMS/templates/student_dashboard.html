<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .navbar {
            background: #4facfe;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .logout-btn {
            background: white;
            color: #4facfe;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #e6f0ff;
        }

        .container {
            padding: 30px;
        }

        .welcome {
            font-size: 22px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card h3 {
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2> LMS - Student</h2>
    <a href="/logout/" class="logout-btn">Logout</a>
</div>

<div class="container">
    <div class="welcome">
         Welcome, <b>{{ request.user.username }}</b>
    </div>

    <div class="card">
        <h3>📖 My Courses</h3>
        <p>View all courses assigned to you.</p>
       <!-- <a href="#" class="btn">View Courses</a> -->
        <a href="/courses/my-courses/" class="btn">View Courses</a>
    </div>

    <div class="card">
        <h3> Watch Videos</h3>
        <p>Access course videos securely.</p>
       <a href="/courses/my-courses/" class="btn">Go to Videos</a>
       <!-- <a href="#" class="btn">Go to Videos</a> -->
    </div>

    <div class="card">
        <h3> Profile</h3>
        <p>Check your account details.</p>
       <a href="/profile/" class="btn">View Profile</a>
    <!--    <a href="#" class="btn">View Profile</a> -->
    </div>
    <div class="card">
        <h3>Take Quiz</h3>
        <p>Check your account details.</p>
       <a href="/courses/quiz/1/" class="btn">Take Quiz</a>
         
    <!--    <a href="#" class="btn">View Profile</a> -->
    </div>
</div>

</body>
</html>
