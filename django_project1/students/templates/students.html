<center>
<h1>Students List</h1>
 <p>{{ NAME }} - {{ AGE }} - {{ EMAIL }} - {{ MARK_1 }} - {{ MARK_2 }} - {{ MARK_3 }} </p>

{% for s in students %}
    <p>{{ s.name }} - {{ s.age }} - {{ s.email }}-{{ s.marka }} - {{ s.markb }} - {{ s.markc }}</p>
    <a href="{% url 'update_student' s.id %}">Edit</a>
        <a href="{% url 'delete_student' s.id %}">Delete</a>
{% empty %}
    <p>No students found</p>
{% endfor %}
</center>
