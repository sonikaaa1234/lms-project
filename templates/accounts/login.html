<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; border-radius: 16px; padding: 48px 40px;
            width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 28px; color: #1a1a2e; font-weight: 800; }
        .logo span { color: #e94560; }
        .logo p { color: #888; font-size: 13px; margin-top: 6px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 16px; border: 1.5px solid #ddd;
            border-radius: 8px; font-size: 14px; transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #e94560; }
        .btn {
            width: 100%; padding: 13px; background: #e94560; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        .btn:hover { background: #c73652; }
        .alert { background: #fde8ec; color: #c0392b; padding: 10px 14px;
            border-radius: 8px; font-size: 13px; margin-bottom: 16px;
            border-left: 4px solid #e94560; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">
        <h1>🎓 <span>LMS</span> Portal</h1>
        <p>Learning Management System</p>
    </div>
    {% if messages %}
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
</div>
</body>
</html>
