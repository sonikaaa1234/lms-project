{% extends 'base.html' %}
{% block title %}Assign Students{% endblock %}
{% block content %}
<div class="card" style="max-width:600px; margin:0 auto;">
    <h2>👥 Assign Students to "{{ course.title }}"</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Select Students</label>
            <div style="border:1.5px solid #ddd; border-radius:8px; padding:12px;
                max-height:300px; overflow-y:auto;">
                {% for student in students %}
                <label style="display:flex; align-items:center; gap:8px;
                    padding:8px 4px; cursor:pointer; font-weight:400;
                    border-bottom:1px solid #f0f0f0;">
                    <input type="checkbox" name="students" value="{{ student.id }}"
                        {% if student in assigned %}checked{% endif %}>
                    <div>
                        <div style="font-size:14px;">{{ student.full_name }}</div>
                        <div style="font-size:12px; color:#888;">{{ student.email }}</div>
                    </div>
                </label>
                {% empty %}
                <p style="color:#888; font-size:13px;">No students available.</p>
                {% endfor %}
            </div>
        </div>
        <div style="display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">Save Assignment</button>
            <a href="{% url 'course_detail' course.id %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
