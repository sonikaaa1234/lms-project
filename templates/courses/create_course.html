{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block content %}
<div class="card" style="max-width:700px; margin:0 auto;">
    <h2>📚 Create New Course</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Course Title</label>
            <input type="text" name="title" required placeholder="e.g. Python for Beginners">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4" placeholder="What will students learn?"
                style="width:100%; padding:10px 14px; border:1.5px solid #ddd;
                border-radius:8px; font-size:14px; font-family:inherit;"></textarea>
        </div>
        <div class="form-group">
            <label>Assign Students</label>
            <div style="border:1.5px solid #ddd; border-radius:8px; padding:12px;
                max-height:200px; overflow-y:auto;">
                {% for student in students %}
                <label style="display:flex; align-items:center; gap:8px;
                    padding:6px 0; cursor:pointer; font-weight:400;">
                    <input type="checkbox" name="students" value="{{ student.id }}">
                    {{ student.full_name }} ({{ student.email }})
                </label>
                {% empty %}
                <p style="color:#888; font-size:13px;">No students available.</p>
                {% endfor %}
            </div>
        </div>
        <div style="display:flex; gap:12px;">
            <button type="submit" class="btn btn-primary">Create Course</button>
            <a href="{% url 'course_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
